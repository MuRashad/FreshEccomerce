<section>
    <div class="container mx-auto ">
     <div class="search-input w-full  flex justify-center my-5">
            <input #inp type="search..." placeholder="search...." class="outline-2 outline-gray-200 rounded-2xl
             shadow-2xl px-4 py-3 w-[50%] focus:outline-2 focus:outline-gray-300 focus:outline-offset-2"
                [(ngModel)]="searchInpElement">
        </div>

        <div class="flex flex-wrap gap-2 my-2 justify-center cursor-crosshair">

            <div class="flex flex-col items-center  
            p-6 shadow-lg shadow-green-500/50 inset-shadow-2xs inset-shadow-green-100/10 md:flex-row md:w-8/12 w-3/4 bg-white-500 rounded-2xl">
            <a class="">
                <img class="object-cover rounded-full w-full rounded-base h-64 md:h-auto md:w-48 mb-4 md:mb-0"
                    [src]="brands[0].image" alt="">
                <div class="flex flex-col justify-between md:p-4 leading-normal">
                    <h5 class="mb-2 text-2xl font-bold tracking-tight text-heading">
                        {{brands[0].name}}
                    </h5>
                    <p class="mb-6 text-body">In today’s fast-paced digital landscape, fostering seamless collaboration
                        among Developers and IT Operations.</p>
                    <div>
                      <button class="btn-main" [routerLink]="['/products']">Shop Now</button>
                    </div>
                </div>
            </a>
            </div>


            <div class="block md:w-3/12 w-3/4 p-6 max:w-full shadow-lg shadow-gray-500/50 inset-shadow-2xs inset-shadow-gray-100/10 bg-green-500 rounded-2xl">
                <a >
                    <img class="rounded-t-base" src="/assets/images/blog-img-1.jpeg" alt="" />
                </a>
                <div class="p-6 text-center">
                    <span
                        class="inline-flex items-center bg-brand-softer border border-brand-subtle text-fg-brand-strong text-xs font-medium px-1.5 py-0.5 rounded-sm">
                        <svg class="w-3 h-3 me-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24"
                            height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M18.122 17.645a7.185 7.185 0 0 1-2.656 2.495 7.06 7.06 0 0 1-3.52.853 6.617 6.617 0 0 1-3.306-.718 6.73 6.73 0 0 1-2.54-2.266c-2.672-4.57.287-8.846.887-9.668A4.448 4.448 0 0 0 8.07 6.31 4.49 4.49 0 0 0 7.997 4c1.284.965 6.43 3.258 5.525 10.631 1.496-1.136 2.7-3.046 2.846-6.216 1.43 1.061 3.985 5.462 1.754 9.23Z" />
                        </svg>
                        Trending
                    </span>
                    <a >
                        <h5 class="mt-3 mb-6 text-2xl font-semibold tracking-tight text-heading">Streamlining your
                            design process today.</h5>
                    </a>
                </div>
            </div>



        </div>

 
        <div class="w-full flex flex-wrap justify-center gap-4  p-4 ">
            @for(brand of brands|searchElement:searchInpElement:'name'; track brand._id ){
            <div class="basis-full md:basis-[calc(25%-8px)] lg:basis-[calc(25%-12px)]   max-w-sm flex flex-col items-center p-4 shadow-lg shadow-green-500/50
             inset-shadow-sm inset-shadow-green-500/50 rounded-base cursor-pointer" role="button"
                [routerLink]="['/brandDtls']">

                <img class="rounded-base w-50" [src]="brand.image" alt="brand.name">
                <div>

                    <h5 class="text-xl text-heading font-semibold tracking-tight  text-center">
                        {{brand.name}}
                    </h5>
                    <div class="flex items-center justify-between mt-3">
                        <span class="text-sm font-bold text-heading">115 products</span>
                    </div>
                </div>
            </div>

            }
        </div>
    </div>

</section>
