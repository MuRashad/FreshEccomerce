<!--  items in each row -->
<section>
    <div class="md:container mx-auto">
        <div class="search-input w-full  flex justify-center my-5">
            <input #inp type="search..." placeholder="search...." class="outline-2 outline-gray-200 rounded-2xl
             shadow-2xl px-4 py-3 w-[50%] focus:outline-2 focus:outline-gray-300 focus:outline-offset-2"
                [(ngModel)]="searchInpElement" ]>
        </div>
        <div class="flex flex-wrap shadow-boxgrey">
            @for(product of products|searchElement:searchInpElement;track product.id){
            <div class="lg:w-2/12 md:w-6/12 w-full p-2">
                <div class="bg-gray-50 rounded-lg py-2 px-4 inset-shadow-sm inset-shadow-gray-300/10 shadow-xl/20
           transition-all duration-300 ease-in-out hover:-translate-y-1 hover:shadow-2xl hover:scale-[1.02] relative group">

           <div class="wishlist-btn absolute top-5 right-5 z-30">
               <button class="cursor-pointer" appChangeColor="text-gray-500"  [productId]="product.id ??'' ">
                <i class="fa-solid fa-heart text-2xl invisible group-hover:visible">
                </i>
            </button>
           </div>
                    <div class="card cursor-pointer  " role="button" [routerLink]="['/prdDtls', product.id]">
                        
                        <figure class="image overflow-hidden rounded-lg">
                            <img [src]="product.imageCover" alt=""
                                class="w-full transition-transform duration-300 ease-in-out hover:scale-105">
                        </figure>

                        <div class="card-info">
                            <h6 class="text-main font-light">{{product?.category?.name}}</h6>

                            <h5 class="line-clamp-1">
                                {{product.title}}
                            </h5>

                            <div class="rate mt-5 flex justify-between">
                                <span>
                                    <p>{{product.price | currency:'USD'}}</p>
                                </span>

                                <span class="flex items-center gap-1">
                                    <i class="fa-solid fa-star text-amber-500"></i>
                                    <p>{{product.ratingsAverage}}</p>
                                </span>
                            </div>
                        </div>
                    </div>

                    <button type="button"
                        class="btn-main my-2 transition-all duration-300 hover:scale-105 active:scale-95"
                        (click)="addToCart(product?.id)">
                        Add To Cart
                    </button>

                </div>
            </div>
            }
        </div>
    </div>

</section>
