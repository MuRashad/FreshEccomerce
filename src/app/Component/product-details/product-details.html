<div class="container mx-auto">
  <div class="flex items-center " *ngIf="productDtls; else loading">

    <div class="image w-1/3">
      <img [src]="productDtls.imageCover" [alt]="productDtls?.title" class="w-full">
    </div>

    <div class="product-info w-2/3 ">
      <h2 class="">{{productDtls?.title}}</h2>
      <p class="parag py-4">{{ productDtls?.description }}</p>
      <h5 class="categ block font-extralight text-[16px]">{{ productDtls?.category?.name }}</h5>
      <span class="price pe-5 mb-3 block font-extralight text-[16px]">{{ productDtls?.price |currency:'EGP'}}</span>
      <button class="btn-main w-full" (click)="addToCart(productDtls?.id)">+Add Product</button>
    </div>

  </div>

  <ng-template #loading>
    <p>data is loading</p>
  </ng-template>
</div>
